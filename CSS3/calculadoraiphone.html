<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS3/assets/css/styleCalculadora.css">
    <title>Calculadora</title>
</head>

<body>
    <table>

        <tr>
            <td colspan="4"><input type="text" class="inputStyle" placeholder="0"></td>
        </tr>
        <tr></tr>


        <tr>
            <td><button class="grisClaro">C</button></td>
            <td><button class="grisClaro">AC</button></td>
            <td><button class="grisClaro">%</button></td>
            <td><button class="operador"> &#247;</button></td>
        </tr>

        <tr>

            <td><button class="num">7</button></td>
            <td><button class="num">8</button></td>
            <td><button class="num">9</button></td>
            <td><button class="operador">X</button></td>

        </tr>

        <tr>

            <td><button class="num">4</button></td>
            <td><button class="num">5</button></td>
            <td><button class="num">6</button></td>
            <td><button class="operador">-</button></td>

        </tr>

        <tr>

            <td><button class="num">1</button></td>
            <td><button class="num">2</button></td>
            <td><button class="num">3</button></td>
            <td><button class="operador">+</button></td>

        </tr>
        <tr>
            <td colspan="2"><button class="botonCero">0</button></td>
            <td><button class="num">,</button></td>
            <td><button class="operador">=</button></td>
        </tr>

        <tr>
            <td><button class="operador">x&#178;</button></td>
            <td><button class="operador">x&#179;</button></td>
            <td><button class="operador">PI</button></td>
            <td><button class="operador">&#8730;</button></td>
        </tr>

    </table>

</body>

</html>
